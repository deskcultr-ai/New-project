name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Staging Supabase project -- CI never touches production data.
      # Public by design (anon key), safe to inline.
      NEXT_PUBLIC_SUPABASE_URL: https://orhhkircshrezlxntkzl.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yaGhraXJjc2hyZXpseG50a3psIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2OTIzMTYsImV4cCI6MjEwMDI2ODMxNn0.GrYrYObwcWimfgqBycGzKurJ5ZmBP4wMRLKWZhjxkCU
      NEXT_PUBLIC_PLATFORM_OWNER_EMAILS: deskcultr@gmail.com
      NEXT_PUBLIC_SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Typecheck + build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
